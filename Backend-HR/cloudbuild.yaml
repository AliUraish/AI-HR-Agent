steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend:$COMMIT_SHA',
      '-t', 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend:latest',
      '.'
    ]

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '--all-tags',
      'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'hr-agent-backend',
      '--image', 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend:$COMMIT_SHA',
      '--region', 'me-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--memory', '1Gi',
      '--cpu', '1',
      '--port', '8080',
      '--min-instances', '0',
      '--max-instances', '10',
      '--set-env-vars', 'NODE_ENV=production,FRONTEND_URL=https://hr-agent-frontend-1080649900100.me-central1.run.app'
    ]

options:
  logging: CLOUD_LOGGING_ONLY 