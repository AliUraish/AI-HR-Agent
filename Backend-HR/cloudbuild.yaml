steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hr-agent-backend'
      - '--image'
      - 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend'
      - '--region'
      - 'me-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production,FRONTEND_URL=https://hr-agent-frontend-1080649900100.me-central1.run.app'

images:
  - 'me-central1-docker.pkg.dev/$PROJECT_ID/hr-agent/backend'

timeout: '1800s'
